name: Build Hound iOS and tvOS

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Get latest upstream release tag
        id: latest
        run: |
          TAG=$(gh release view --repo Hound-Media-Server/hound-app --json tagName --jq .tagName)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Checkout upstream release
        uses: actions/checkout@v4
        with:
          repository: Hound-Media-Server/hound-app
          ref: ${{ steps.latest.outputs.tag }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Select Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Install dependencies
        run: npm ci

      - name: Update Expo SDK 55 patch dependencies
        run: |
          npm install --no-save expo@55.0.26
          node -p "'expo=' + require('expo/package.json').version + ', expo-modules-core=' + require('expo-modules-core/package.json').version"

      - name: Build unsigned iOS IPA
        run: |
          npx expo prebuild --clean
          npx pod-install ios

          SCHEME=$(xcodebuild -list -json -workspace ios/*.xcworkspace | ruby -rjson -e 'puts JSON.parse(STDIN.read)["workspace"]["schemes"][0]')

          xcodebuild \
            -workspace ios/*.xcworkspace \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/ios \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_VERSION=6 \
            build

          mkdir -p Payload
          cp -R build/ios/Build/Products/Release-iphoneos/*.app Payload/
          zip -r Hound-iOS-${{ steps.latest.outputs.tag }}-unsigned.ipa Payload
          rm -rf Payload

      - name: Build unsigned tvOS IPA
        run: |
          EXPO_TV=1 npx expo prebuild --clean
          npx pod-install ios

          SCHEME=$(xcodebuild -list -json -workspace ios/*.xcworkspace | ruby -rjson -e 'puts JSON.parse(STDIN.read)["workspace"]["schemes"][0]')

          xcodebuild \
            -workspace ios/*.xcworkspace \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk appletvos \
            -destination 'generic/platform=tvOS' \
            -derivedDataPath build/tvos \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_VERSION=6 \
            build

          mkdir -p Payload
          cp -R build/tvos/Build/Products/Release-appletvos/*.app Payload/
          zip -r Hound-tvOS-${{ steps.latest.outputs.tag }}-unsigned.ipa Payload
          rm -rf Payload

      - name: Upload IPAs
        uses: actions/upload-artifact@v4
        with:
          name: Hound-Apple-${{ steps.latest.outputs.tag }}-unsigned-IPAs
          path: |
            Hound-iOS-*-unsigned.ipa
            Hound-tvOS-*-unsigned.ipa
